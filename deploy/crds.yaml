apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ippools.crd.projectcalico.org
spec:
  group: crd.projectcalico.org
  names:
    categories: []
    kind: IPPool
    plural: ippools
    shortNames: []
    singular: ippool
  scope: Cluster
  versions:
  - additionalPrinterColumns: []
    name: v1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for IpPoolSpec via `CustomResource`
        properties:
          spec:
            description: |-
              Spec for the `IPPool` resource — an allocatable address range. Deriving
              [`CustomResource`] generates the cluster-scoped `IPPool` root type (with
              metadata/status) and `IPPool::crd()` for CRD manifest generation.
            properties:
              allowedUses:
                items:
                  description: 'What an IP pool may be used for. Wire values: `Workload` / `Tunnel` / `LoadBalancer`.'
                  enum:
                  - Workload
                  - Tunnel
                  - LoadBalancer
                  type: string
                type: array
              assignmentMode:
                default: Automatic
                description: Whether addresses are auto-assigned or only assigned manually.
                enum:
                - Automatic
                - Manual
                type: string
              blockSize:
                format: uint8
                maximum: 255.0
                minimum: 0.0
                nullable: true
                type: integer
              cidr:
                type: string
              disableBGPExport:
                default: false
                type: boolean
              disabled:
                default: false
                type: boolean
              ipipMode:
                default: Never
                description: |-
                  Encapsulation mode shared by `ipipMode` and `vxlanMode`. Wire values match
                  upstream: `Never` / `Always` / `CrossSubnet`.
                enum:
                - Never
                - Always
                - CrossSubnet
                type: string
              namespaceSelector:
                nullable: true
                type: string
              natOutgoing:
                default: false
                type: boolean
              nodeSelector:
                nullable: true
                type: string
              vxlanMode:
                default: Never
                description: |-
                  Encapsulation mode shared by `ipipMode` and `vxlanMode`. Wire values match
                  upstream: `Never` / `Always` / `CrossSubnet`.
                enum:
                - Never
                - Always
                - CrossSubnet
                type: string
            required:
            - cidr
            type: object
        required:
        - spec
        title: IPPool
        type: object
    served: true
    storage: true
    subresources: {}
